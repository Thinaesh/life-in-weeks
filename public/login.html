<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Life in Weeks — your life visualization tool.">
    <title>Sign In — Life in Weeks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-body">
    <!-- Animated background orbs -->
    <div class="auth-bg">
        <div class="auth-orb auth-orb-1"></div>
        <div class="auth-orb auth-orb-2"></div>
        <div class="auth-orb auth-orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card" id="auth-card">
            <div class="auth-glow"></div>

            <!-- Logo -->
            <div class="auth-logo">
                <h1>Life<span class="accent">.</span>Weeks</h1>
                <p class="auth-tagline">Your life, visualized</p>
            </div>

            <!-- Tab toggle -->
            <div class="auth-tabs" id="auth-tabs">
                <button class="auth-tab active" data-tab="login" id="tab-login">Sign In</button>
                <button class="auth-tab" data-tab="register" id="tab-register">Create Account</button>
                <div class="auth-tab-indicator" id="tab-indicator"></div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="auth-form-group">
                    <label for="login-username">Username</label>
                    <div class="auth-input-wrapper">
                        <span class="auth-input-icon">👤</span>
                        <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" required>
                    </div>
                </div>
                <div class="auth-form-group">
                    <label for="login-password">Password</label>
                    <div class="auth-input-wrapper">
                        <span class="auth-input-icon">🔒</span>
                        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
                        <button type="button" class="auth-toggle-pw" data-target="login-password" aria-label="Toggle password visibility">👁</button>
                    </div>
                </div>
                <div class="auth-error hidden" id="login-error"></div>
                <button type="submit" class="btn btn-primary btn-glow auth-submit" id="login-submit">
                    <span class="auth-btn-text">Sign In</span>
                    <span class="auth-btn-loader hidden" id="login-loader"></span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="auth-form-group">
                    <label for="register-username">Username</label>
                    <div class="auth-input-wrapper">
                        <span class="auth-input-icon">👤</span>
                        <input type="text" id="register-username" placeholder="Choose a username" autocomplete="username" minlength="3" required>
                    </div>
                    <span class="auth-hint">At least 3 characters</span>
                </div>
                <div class="auth-form-group">
                    <label for="register-password">Password</label>
                    <div class="auth-input-wrapper">
                        <span class="auth-input-icon">🔒</span>
                        <input type="password" id="register-password" placeholder="Create a password" autocomplete="new-password" minlength="6" required>
                        <button type="button" class="auth-toggle-pw" data-target="register-password" aria-label="Toggle password visibility">👁</button>
                    </div>
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <span class="strength-label" id="strength-label"></span>
                    </div>
                </div>
                <div class="auth-form-group">
                    <label for="register-confirm">Confirm Password</label>
                    <div class="auth-input-wrapper">
                        <span class="auth-input-icon">🔒</span>
                        <input type="password" id="register-confirm" placeholder="Confirm your password" autocomplete="new-password" minlength="6" required>
                    </div>
                </div>
                <div class="auth-error hidden" id="register-error"></div>
                <button type="submit" class="btn btn-primary btn-glow auth-submit" id="register-submit">
                    <span class="auth-btn-text">Create Account</span>
                    <span class="auth-btn-loader hidden" id="register-loader"></span>
                </button>
            </form>
        </div>

        <p class="auth-footer">
            Every week is a diamond. Make them count. 💎
        </p>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
