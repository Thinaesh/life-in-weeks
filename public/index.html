<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Visualize your entire life as a grid of weeks. Track chapters, journal entries, milestones, and goals. Inspired by Wait But Why.">
    <title>Life in Weeks — Your Life, Visualized</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <!-- =========================== ONBOARDING MODAL =========================== -->
    <div id="onboarding-overlay" class="modal-overlay hidden">
        <div class="modal onboarding-modal">
            <div class="modal-glow"></div>
            <h1 class="modal-title">Welcome to <span class="accent">Life in Weeks</span></h1>
            <p class="modal-subtitle">Visualize your entire life. Every week counts.</p>
            <form id="onboarding-form" class="onboarding-form">
                <div class="form-group">
                    <label for="ob-name">Your Name</label>
                    <input type="text" id="ob-name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="ob-dob">Date of Birth</label>
                    <input type="date" id="ob-dob" required>
                </div>
                <div class="form-group">
                    <label for="ob-lifespan">Expected Lifespan (years)</label>
                    <input type="number" id="ob-lifespan" value="80" min="1" max="120">
                </div>
                <button type="submit" class="btn btn-primary btn-glow">Begin Your Journey</button>
            </form>
        </div>
    </div>

    <!-- =========================== MAIN APP =========================== -->
    <div id="app" class="app hidden">
        <!-- HEADER -->
        <header class="app-header">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle navigation menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            <div class="header-left">
                <h1 class="logo">Life<span class="accent">.</span>Weeks</h1>
            </div>
            <nav class="header-nav" id="header-nav">
                <button class="nav-btn active" data-section="grid" id="nav-grid">
                    <span class="nav-icon">▦</span> Grid
                </button>
                <button class="nav-btn" data-section="stats" id="nav-stats">
                    <span class="nav-icon">◉</span> Stats
                </button>
                <button class="nav-btn" data-section="chapters" id="nav-chapters">
                    <span class="nav-icon">◧</span> Chapters
                </button>
                <button class="nav-btn" data-section="milestones" id="nav-milestones">
                    <span class="nav-icon">♦</span> Milestones
                </button>
                <button class="nav-btn" data-section="goals" id="nav-goals">
                    <span class="nav-icon">⊕</span> Goals
                </button>
                <button class="nav-btn" data-section="settings" id="nav-settings">
                    <span class="nav-icon">⚙</span> Settings
                </button>
            </nav>
            <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>
            <div class="header-right">
                <div class="view-toggle" id="view-toggle">
                    <button class="view-btn active" data-view="weeks" title="Weeks View">W</button>
                    <button class="view-btn" data-view="months" title="Months View">M</button>
                    <button class="view-btn" data-view="years" title="Years View">Y</button>
                    <button class="view-btn" data-view="era" title="Era View">E</button>
                </div>
                <span class="user-name" id="user-name"></span>
            </div>
        </header>

        <!-- LIFE SUMMARY BAR -->
        <div class="life-bar" id="life-bar">
            <div class="life-bar-info">
                <span id="weeks-lived">0</span> weeks lived
                <span class="separator">·</span>
                <span id="weeks-remaining">0</span> remaining
                <span class="separator">·</span>
                <span id="life-percent">0%</span> of life
            </div>
            <div class="life-bar-track">
                <div class="life-bar-fill" id="life-bar-fill"></div>
                <div class="life-bar-current" id="life-bar-current"></div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- GRID SECTION -->
            <section id="section-grid" class="section active">
                <div class="grid-toolbar">
                    <div class="grid-labels">
                        <span class="grid-label-year">Years ↓</span>
                        <span class="grid-label-week">Weeks →</span>
                    </div>
                    <div class="grid-toolbar-actions">
                        <label class="toggle-label">
                            <input type="checkbox" id="heatmap-toggle"> Heatmap
                        </label>
                        <button class="btn btn-sm" id="export-grid-btn">📤 Export</button>
                    </div>
                </div>
                <div class="grid-container" id="grid-container">
                    <div class="grid-year-labels" id="grid-year-labels"></div>
                    <div class="week-grid" id="week-grid"></div>
                </div>
            </section>

            <!-- STATS SECTION -->
            <section id="section-stats" class="section hidden">
                <div class="stats-grid" id="stats-content"></div>
            </section>

            <!-- CHAPTERS SECTION -->
            <section id="section-chapters" class="section hidden">
                <div class="section-header">
                    <h2>Life Chapters</h2>
                    <button class="btn btn-primary" id="add-chapter-btn">+ New Chapter</button>
                </div>
                <div class="chapters-list" id="chapters-list"></div>
            </section>

            <!-- MILESTONES SECTION -->
            <section id="section-milestones" class="section hidden">
                <div class="section-header">
                    <h2>Milestones</h2>
                    <button class="btn btn-primary" id="add-milestone-btn">+ New Milestone</button>
                </div>
                <div class="milestones-list" id="milestones-list"></div>
            </section>

            <!-- GOALS SECTION -->
            <section id="section-goals" class="section hidden">
                <div class="section-header">
                    <h2>Goals & Countdowns</h2>
                    <button class="btn btn-primary" id="add-goal-btn">+ New Goal</button>
                </div>
                <div class="goals-list" id="goals-list"></div>
            </section>

            <!-- SETTINGS SECTION -->
            <section id="section-settings" class="section hidden">
                <div class="settings-panel" id="settings-panel"></div>
            </section>
        </main>

        <!-- JOURNAL SIDE PANEL -->
        <aside id="journal-panel" class="journal-panel hidden">
            <div class="journal-header">
                <h3 id="journal-title">Week Journal</h3>
                <button class="btn-close" id="journal-close">✕</button>
            </div>
            <div class="journal-body">
                <div class="journal-date-range" id="journal-date-range"></div>
                <div class="journal-rating" id="journal-rating">
                    <label>How was this week?</label>
                    <div class="rating-stars" id="rating-stars">
                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>
                        <span class="star" data-rating="3">★</span>
                        <span class="star" data-rating="4">★</span>
                        <span class="star" data-rating="5">★</span>
                    </div>
                </div>
                <textarea id="journal-note" placeholder="What happened this week? How are you spending your diamonds?"
                    rows="6"></textarea>
                <div class="journal-snapshot">
                    <label>Week Snapshot</label>
                    <div class="snapshot-area" id="snapshot-area">
                        <img id="snapshot-preview" class="snapshot-preview hidden" alt="Week snapshot">
                        <label class="snapshot-upload" id="snapshot-upload-label">
                            <input type="file" id="snapshot-input" accept="image/*" hidden>
                            <span>📷 Upload Photo</span>
                        </label>
                    </div>
                </div>
                <button class="btn btn-primary" id="journal-save">Save Entry</button>
            </div>
        </aside>

        <!-- TOAST -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <!-- MODALS (chapters, milestones, goals) -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal" id="dynamic-modal">
            <div class="modal-glow"></div>
            <h2 id="modal-title"></h2>
            <form id="modal-form"></form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
